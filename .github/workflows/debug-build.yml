name: Debug Build Log

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --debug --no-tree-shake-icons > build_log.txt 2>&1 || true
      - name: Upload Log
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: build_log.txt
